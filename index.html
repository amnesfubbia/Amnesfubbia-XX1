<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Amnesfubbia Music | Full Stream</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --soft-green: #a8dadc; /* Warna hijau lembut favoritmu */
            --dark-green: #2d6a4f;
            --black-bg: #0a0a0a;
        }
        body {
            background-color: var(--black-bg);
            color: white;
            font-family: 'Inter', sans-serif;
        }
        .green-glow:hover {
            box-shadow: 0 0 15px rgba(168, 218, 220, 0.4);
            border-color: var(--soft-green);
        }
        .active-server {
            background-color: var(--soft-green) !important;
            color: var(--black-bg) !important;
            font-weight: bold;
        }
        iframe {
            border-radius: 12px;
            border: 1px solid #333;
        }
    </style>
</head>
<body class="p-4 md:p-8">

    <header class="flex justify-between items-center mb-10">
        <div>
            <h1 class="text-3xl font-bold tracking-tighter" style="color: var(--soft-green);">AMNESFUBBIA<span class="text-white">MUSIC</span></h1>
            <p class="text-xs text-gray-500 uppercase tracking-widest">Global Digital Streaming</p>
        </div>
        <div class="flex gap-4">
            <i class="fa-solid fa-magnifying-glass text-xl cursor-pointer hover:text-cyan-200"></i>
            <i class="fa-solid fa-bars text-xl cursor-pointer"></i>
        </div>
    </header>

    <main class="max-w-6xl mx-auto grid grid-cols-1 lg:grid-cols-3 gap-8">
        
        <div class="lg:col-span-2">
            <div id="playerContainer" class="relative aspect-video w-full bg-black rounded-xl overflow-hidden shadow-2xl border border-zinc-800">
                <iframe id="mainPlayer" width="100%" height="100%" src="https://www.youtube.com/embed/dQw4w9WgXcQ" frameborder="0" allow="autoplay; clipboard-write; encrypted-media; picture-in-picture" allowfullscreen></iframe>
            </div>

            <div class="mt-6 flex flex-wrap gap-3">
                <button onclick="changeServer('yt', 'dQw4w9WgXcQ')" id="btn-yt" class="active-server px-4 py-2 bg-zinc-900 rounded-md text-sm transition green-glow">
                    <i class="fa-brands fa-youtube mr-2"></i>Full Stream (YT)
                </button>
                <button onclick="changeServer('spotify', '4cOdK2wG6SdyP9mThSET9U')" id="btn-spotify" class="px-4 py-2 bg-zinc-900 rounded-md text-sm transition green-glow">
                    <i class="fa-brands fa-spotify mr-2"></i>Spotify Widget
                </button>
                <button onclick="changeServer('deezer', '2124501')" id="btn-deezer" class="px-4 py-2 bg-zinc-900 rounded-md text-sm transition green-glow">
                    <i class="fa-brands fa-deezer mr-2"></i>Preview 30s
                </button>
            </div>

            <div class="mt-8 border-t border-zinc-800 pt-6">
                <h2 id="songTitle" class="text-2xl font-bold">Never Gonna Give You Up</h2>
                <p id="artistName" class="text-lg" style="color: var(--soft-green);">Rick Astley</p>
                <div class="flex gap-4 mt-4 text-gray-400 text-sm">
                    <span><i class="fa-solid fa-calendar mr-2"></i>1987</span>
                    <span><i class="fa-solid fa-compact-disc mr-2"></i>Pop / Soul</span>
                    <span><i class="fa-solid fa-earth-americas mr-2"></i>Official Audio</span>
                </div>
            </div>
        </div>

        <div class="space-y-6">
            <h3 class="text-xl font-semibold border-l-4 pl-3" style="border-color: var(--soft-green);">Trending Now</h3>
            
            <div onclick="selectTrack('Blinding Lights', 'The Weeknd', 'jfKfPfyJRdk', '0VjIj9Hpuzm6dqUsYvOPIE')" class="flex gap-4 p-3 bg-zinc-900/50 rounded-lg hover:bg-zinc-800 cursor-pointer transition">
                <img src="https://i1.sndcdn.com/artworks-X0v7F6Yw2j2F-0-t500x500.jpg" class="w-16 h-16 rounded object-cover shadow-lg">
                <div>
                    <p class="font-medium text-white">Blinding Lights</p>
                    <p class="text-xs text-gray-500">The Weeknd</p>
                </div>
            </div>

            <div onclick="selectTrack('Stay', 'Justin Bieber', 'kTJczUoc26U', '5HCyWwuE9hBJBTMncGWIvY')" class="flex gap-4 p-3 bg-zinc-900/50 rounded-lg hover:bg-zinc-800 cursor-pointer transition">
                <img src="https://upload.wikimedia.org/wikipedia/en/0/07/The_Kid_Laroi_and_Justin_Bieber_-_Stay.png" class="w-16 h-16 rounded object-cover shadow-lg">
                <div>
                    <p class="font-medium text-white">Stay</p>
                    <p class="text-xs text-gray-500">Kid LAROI & Bieber</p>
                </div>
            </div>
        </div>

    </main>

    <script>
        let currentYtId = "dQw4w9WgXcQ";
        let currentSpotifyId = "4cOdK2wG6SdyP9mThSET9U";

        function changeServer(type, id) {
            const player = document.getElementById('mainPlayer');
            const buttons = document.querySelectorAll('button[id^="btn-"]');
            
            // Reset button styles
            buttons.forEach(btn => btn.classList.remove('active-server'));
            document.getElementById(`btn-${type}`).classList.add('active-server');

            if (type === 'yt') {
                player.src = `https://www.youtube.com/embed/${currentYtId}?autoplay=1`;
            } else if (type === 'spotify') {
                player.src = `https://open.spotify.com/embed/track/${currentSpotifyId}`;
            } else if (type === 'deezer') {
                // Contoh ID statis untuk demo
                player.src = `https://www.deezer.com/plugins/player?type=tracks&id=2124501&format=classic`;
            }
        }

        function selectTrack(title, artist, ytId, spId) {
            currentYtId = ytId;
            currentSpotifyId = spId;
            
            document.getElementById('songTitle').innerText = title;
            document.getElementById('artistName').innerText = artist;
            
            // Reset ke server YouTube sebagai default saat ganti lagu
            changeServer('yt', ytId);
        }
    </script>
</body>
</html>
