<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>amnesfubbia music</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <style>
        body { background-color: #000; color: #fff; font-family: 'Inter', sans-serif; margin: 0; overflow-x: hidden; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        /* SPLASH SCREEN */
        #splashScreen { position: fixed; inset: 0; background: #000; z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .splash-logo { width: 80px; height: 80px; animation: splashScale 0.8s ease-out; }
        @keyframes splashScale { from { transform: scale(0.9); opacity: 0; } to { transform: scale(1); opacity: 1; } }

        /* MUSIC DISK ANIMATION */
        @keyframes rotateDisk { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .disk-spin { animation: rotateDisk 5s linear infinite; animation-play-state: paused; }
        .playing .disk-spin { animation-play-state: running; }

        .profile-header { padding: 15px; background: #000; }
        .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .ig-logo { font-weight: 900; font-size: 22px; letter-spacing: -1px; }
        
        .profile-info { display: flex; align-items: center; gap: 20px; margin-bottom: 15px; }
        .profile-pic-logo { width: 78px; height: 78px; border-radius: 50%; border: 2px solid #262626; padding: 3px; }
        .profile-pic-logo img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; }

        .stats { display: flex; flex-grow: 1; justify-content: space-around; text-align: center; }
        .stat-val { font-weight: 800; font-size: 17px; display: block; }
        .stat-label { font-size: 12px; color: #8e8e8e; }

        .music-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1px; padding-bottom: 80px; }
        .music-card { position: relative; aspect-ratio: 1/1; background: #111; overflow: hidden; cursor: pointer; }
        .music-card img { width: 100%; height: 100%; object-fit: cover; }
        .badge-preview { position: absolute; top: 5px; right: 5px; background: rgba(0,0,0,0.6); padding: 2px 6px; border-radius: 4px; font-size: 8px; font-weight: 800; border: 0.5px solid rgba(255,255,255,0.2); }

        /* PLAYER MODAL */
        #playerModal { display: none; position: fixed; inset: 0; background: #000; z-index: 9000; overflow-y: auto; }
        .player-disk-wrapper { position: relative; width: 250px; height: 250px; margin: 40px auto; }
        .disk-outer { width: 100%; height: 100%; background: #111; border-radius: 50%; border: 8px solid #222; display: flex; align-items: center; justify-content: center; box-shadow: 0 0 30px rgba(255,255,255,0.05); }
        .disk-inner { width: 90px; height: 90px; border-radius: 50%; border: 4px solid #000; overflow: hidden; }

        .lyrics-container { padding: 20px; text-align: center; color: #8e8e8e; font-size: 15px; line-height: 1.8; font-weight: 600; height: 200px; overflow-y: auto; }
        .lyrics-container::-webkit-scrollbar { display: none; }
        .lyric-active { color: #fff; font-size: 18px; }

        .audio-controls { padding: 20px; display: flex; flex-direction: column; align-items: center; gap: 20px; }
        .progress-bar { width: 100%; height: 4px; background: #333; border-radius: 2px; position: relative; }
        .progress-fill { width: 0%; height: 100%; background: #fff; border-radius: 2px; }

        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: #000; border-top: 1px solid #1c1c1c; display: flex; justify-content: space-around; padding: 15px 0; z-index: 8000; }
        
        .search-bar { background: #262626; border-radius: 10px; padding: 10px; margin: 0 15px 15px; display: flex; align-items: center; gap: 10px; }
        .search-bar input { background: transparent; border: none; outline: none; color: #fff; flex: 1; font-size: 14px; }
    </style>
</head>
<body>

    <div id="splashScreen">
        <img src="https://cdn-icons-png.flaticon.com/512/1384/1384061.png" class="splash-logo" style="filter: invert(1);">
        <div class="mt-4 font-black tracking-widest text-white uppercase text-xs">amnesfubbia music</div>
    </div>

    <div id="mainApp" style="display:none">
        <div class="profile-header">
            <div class="top-bar">
                <h1 class="ig-logo">amnesfubbia</h1>
                <div class="flex gap-4">
                    <i class="ph ph-plus-square text-2xl"></i>
                    <i class="ph ph-list text-2xl"></i>
                </div>
            </div>

            <div class="profile-info">
                <div class="profile-pic-logo">
                    <img src="https://i.pinimg.com/736x/8f/c0/51/8fc0510e82030997193d5f1d44146747.jpg" alt="Profile">
                </div>
                <div class="stats">
                    <div class="stat-item"><span class="stat-val">128</span><span class="stat-label">Artists</span></div>
                    <div class="stat-item"><span class="stat-val">2.5k</span><span class="stat-label">Tracks</span></div>
                    <div class="stat-item"><span class="stat-val">430</span><span class="stat-label">Albums</span></div>
                </div>
            </div>

            <div class="bio px-1 mb-4">
                <div class="font-bold text-sm">amnesfubbia music</div>
                <div class="text-sm text-zinc-400">Your neighbor's record store. Digital vibes.</div>
                <div class="text-blue-400 text-sm font-semibold mt-1">linktr.ee/amnesfubbia</div>
            </div>

            <div class="search-bar">
                <i class="ph ph-magnifying-glass text-zinc-500"></i>
                <input type="text" id="musicSearch" placeholder="Search track or artist..." onkeydown="if(event.key==='Enter') searchMusic()">
            </div>
        </div>

        <div id="feedGrid" class="music-grid">
            </div>
    </div>

    <div id="playerModal">
        <div class="px-4 py-6 flex items-center justify-between">
            <i class="ph ph-caret-down text-2xl" onclick="closePlayer()"></i>
            <div class="text-center">
                <div class="text-[10px] uppercase tracking-widest text-zinc-500 font-bold">Playing From Discover</div>
                <div id="mTitle" class="text-sm font-bold truncate w-48">Track Name</div>
            </div>
            <i class="ph ph-dots-three-vertical text-2xl"></i>
        </div>

        <div class="player-disk-wrapper" id="diskCont">
            <div class="disk-outer disk-spin">
                <div class="disk-inner">
                    <img id="mCover" src="" class="w-full h-full object-cover">
                </div>
            </div>
        </div>

        <div class="text-center px-6">
            <h2 id="mTrack" class="text-2xl font-black truncate">Song Title</h2>
            <p id="mArtist" class="text-zinc-400 font-bold text-sm mt-1">Artist Name</p>
        </div>

        <div class="lyrics-container no-scrollbar" id="lyricsBox">
            <p>Loading lyrics...</p>
        </div>

        <div class="audio-controls">
            <div class="progress-bar">
                <div id="progressFill" class="progress-fill"></div>
            </div>
            <div class="flex items-center gap-10">
                <i class="ph ph-skip-back text-3xl"></i>
                <div id="playBtn" class="w-16 h-16 bg-white rounded-full flex items-center justify-center" onclick="togglePlay()">
                    <i class="ph ph-play-fill text-black text-3xl"></i>
                </div>
                <i class="ph ph-skip-forward text-3xl"></i>
            </div>
        </div>
    </div>

    <nav class="bottom-nav">
        <i class="ph ph-house-fill text-2xl"></i>
        <i class="ph ph-magnifying-glass text-2xl"></i>
        <i class="ph ph-browser text-2xl"></i>
        <i class="ph ph-user-circle text-2xl"></i>
    </nav>

    <audio id="mainAudio" preload="auto"></audio>

    <script>
        const audio = document.getElementById('mainAudio');
        let isPlaying = false;

        window.onload = () => {
            setTimeout(() => {
                document.getElementById('splashScreen').style.display = 'none';
                document.getElementById('mainApp').style.display = 'block';
                searchMusic('Lofi Hip Hop'); // Initial load
            }, 2000);
        };

        async function searchMusic(query) {
            const q = query || document.getElementById('musicSearch').value;
            if(!q) return;

            const grid = document.getElementById('feedGrid');
            grid.innerHTML = '<div class="col-span-3 text-center py-20 text-xs text-zinc-500">Scanning frequency...</div>';

            try {
                // Menggunakan iTunes API (Lebih stabil untuk data lagu + preview)
                const res = await fetch(`https://itunes.apple.com/search?term=${encodeURIComponent(q)}&entity=song&limit=21`);
                const data = await res.json();
                
                grid.innerHTML = '';
                data.results.forEach(song => {
                    const card = document.createElement('div');
                    card.className = 'music-card';
                    card.onclick = () => openPlayer(song);
                    card.innerHTML = `
                        <div class="badge-preview">PREVIEW</div>
                        <img src="${song.artworkUrl100.replace('100x100', '600x600')}" loading="lazy">
                    `;
                    grid.appendChild(card);
                });
            } catch (e) {
                grid.innerHTML = '<div class="col-span-3 text-center py-20">Gagal memuat musik.</div>';
            }
        }

        function openPlayer(song) {
            document.getElementById('playerModal').style.display = 'block';
            document.getElementById('mTitle').innerText = song.collectionName || 'Single';
            document.getElementById('mTrack').innerText = song.trackName;
            document.getElementById('mArtist').innerText = song.artistName;
            document.getElementById('mCover').src = song.artworkUrl100.replace('100x100', '600x600');
            
            audio.src = song.previewUrl;
            
            // Mock lyrics based on title
            document.getElementById('lyricsBox').innerHTML = `
                <p class="lyric-active">♫ Playing: ${song.trackName}</p>
                <p>Artist: ${song.artistName}</p>
                <p>This is a 30-second preview</p>
                <p>Official release on ${song.primaryGenreName}</p>
                <p>---</p>
                <p>Amnesfubbia Music Network</p>
            `;

            togglePlay(true);
        }

        function togglePlay(forcePlay = false) {
            const btn = document.getElementById('playBtn').querySelector('i');
            const disk = document.getElementById('diskCont');

            if (!isPlaying || forcePlay) {
                audio.play();
                isPlaying = true;
                btn.className = 'ph ph-pause-fill text-black text-3xl';
                disk.classList.add('playing');
            } else {
                audio.pause();
                isPlaying = false;
                btn.className = 'ph ph-play-fill text-black text-3xl';
                disk.classList.remove('playing');
            }
        }

        audio.ontimeupdate = () => {
            const progress = (audio.currentTime / audio.duration) * 100;
            document.getElementById('progressFill').style.width = `${progress}%`;
        };

        function closePlayer() {
            document.getElementById('playerModal').style.display = 'none';
            audio.pause();
            isPlaying = false;
        }

        function searchAction() {
            searchMusic();
        }
    </script>
</body>
</html>
